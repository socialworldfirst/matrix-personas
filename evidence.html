<!DOCTYPE html>
<html lang="en-GB"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Chinese-social persona evidence → WF matrix</title>
<style>
  :root{--ink:#16181d;--ink2:#3a3f47;--mut:#6c727a;--faint:#9aa0a6;--line:#e9e9e5;--bg:#fcfcfa;--card:#fff;--accent:#0a66c2;--gold:#b07a2b;--green:#3f7d58;--red:#b0392b;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font:15.5px/1.62 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  .layout{display:grid;grid-template-columns:236px 1fr;max-width:1140px;margin:0 auto;gap:0}
  nav{position:sticky;top:0;align-self:start;height:100vh;padding:40px 22px 40px 28px;border-right:1px solid var(--line)}
  nav .navttl{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);font-weight:650;margin-bottom:18px}
  nav a{display:flex;gap:10px;align-items:baseline;color:var(--mut);font-size:13.5px;padding:7px 0;border:0;line-height:1.3}
  nav a .n{font-variant-numeric:tabular-nums;color:var(--faint);font-size:11.5px;min-width:16px}
  nav a.on{color:var(--ink);font-weight:600} nav a.on .n{color:var(--gold)}
  nav a:hover{color:var(--ink);text-decoration:none}
  main{padding:48px 56px 120px;min-width:0;max-width:820px}
  .eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.09em;color:var(--faint);font-weight:650;margin-bottom:14px}
  h1{font-size:30px;line-height:1.18;letter-spacing:-.02em;font-weight:660;margin-bottom:14px}
  .dek{font-size:16.5px;color:var(--ink2);line-height:1.55;margin-bottom:14px}
  .stamp{font-size:12.5px;color:var(--faint);line-height:1.5;border-top:1px solid var(--line);padding-top:14px}
  section{padding-top:46px;margin-top:30px;border-top:1px solid var(--line)}
  section:first-of-type{border-top:0}
  .sec-head{display:flex;align-items:baseline;gap:13px;margin-bottom:14px;flex-wrap:wrap}
  .sec-head .num{font-variant-numeric:tabular-nums;font-size:13px;font-weight:700;color:var(--gold)}
  .sec-head h2{font-size:22px;letter-spacing:-.015em;font-weight:650}
  .sec-head .meta{font-size:13px;color:var(--faint)}
  .body{color:var(--ink2);margin-bottom:14px}
  .truths{display:flex;flex-direction:column;gap:14px;margin-top:18px}
  .truth{display:flex;gap:15px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px 18px}
  .truth .t-n{flex:none;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .truth div:last-child{font-size:14.5px;color:var(--ink2)} .truth b{color:var(--ink)}
  .arch{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:20px 22px;margin-bottom:16px}
  .arch-h{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:3px}
  .arch-h h3{font-size:17px;letter-spacing:-.01em;font-weight:650}
  .own{font-size:11.5px;font-weight:650;white-space:nowrap;display:flex;align-items:center;gap:6px}
  .own::before{content:"";width:8px;height:8px;border-radius:50%;display:inline-block}
  .own-hi{color:var(--green)} .own-hi::before{background:var(--green)}
  .own-md{color:var(--gold)} .own-md::before{background:var(--gold)}
  .own-lo{color:var(--faint)} .own-lo::before{background:var(--faint)}
  .role{font-size:12.5px;color:var(--mut);font-style:italic;margin-bottom:10px}
  .arch p{font-size:14.5px;color:var(--ink2);margin-bottom:10px} .arch b{color:var(--ink)}
  .ev{list-style:none;margin:0 0 10px;padding:13px 15px;background:#fbfbf8;border:1px solid var(--line);border-radius:10px}
  .ev li{font-size:13px;color:var(--ink2);padding:4px 0;line-height:1.5;border-bottom:1px solid var(--line)}
  .ev li:last-child{border-bottom:0} .ev b{color:var(--ink)}
  .verdict{font-size:14px;color:var(--ink2);border-left:2px solid var(--ink);padding-left:13px;margin-top:4px}
  .rails{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:18px}
  .rail{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 17px}
  .rail h4{font-size:14px;font-weight:650;margin-bottom:7px;color:var(--ink)}
  .rail p{font-size:13px;color:var(--ink2);line-height:1.5}
  .model{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:20px}
  .acct{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:17px 18px;display:flex;flex-direction:column}
  .acct-h{display:flex;align-items:center;gap:9px;margin-bottom:11px;flex-wrap:wrap}
  .acct-n{flex:none;width:27px;height:27px;border-radius:8px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
  .acct-h h3{font-size:16px;font-weight:650}
  .acct-role{font-size:11.5px;color:var(--mut);width:100%;font-style:italic}
  .acct p{font-size:13px;color:var(--ink2);margin-bottom:9px} .acct b{color:var(--ink)}
  .risk{margin-top:auto;font-size:12px;color:var(--mut);border-top:1px solid var(--line);padding-top:9px}
  table.reg{width:100%;border-collapse:collapse;margin-top:16px;font-size:13px}
  table.reg th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);font-weight:650;padding:8px 10px;border-bottom:1.5px solid var(--line)}
  table.reg td{padding:11px 10px;border-bottom:1px solid var(--line);color:var(--ink2);vertical-align:top}
  table.reg td b{color:var(--ink)}
  .src{list-style:none;padding:0;margin-top:8px} .src li{font-size:13.5px;color:var(--ink2);padding:5px 0;border-bottom:1px solid var(--line)} .src b{color:var(--ink)}
  .caveat{font-size:12.5px;color:var(--faint);margin-top:16px;font-style:italic;line-height:1.5}
  .foot{max-width:820px;margin:0 auto;padding:0 56px 60px;color:var(--faint);font-size:12px}
  .foot a{color:var(--faint);text-decoration:underline;cursor:pointer}
  /* gate */
  #gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50}
  .gbox{width:300px;max-width:88vw;text-align:center}
  .gbox h3{font-size:15px;font-weight:600;margin-bottom:4px}.gbox p{font-size:12.5px;color:var(--mut);margin-bottom:16px}
  .gbox input{width:100%;border:1px solid var(--line);border-radius:9px;padding:11px 13px;font:15px inherit;text-align:center;background:var(--card)}
  .gbox input:focus{outline:none;border-color:var(--ink)}
  .gbox button{width:100%;margin-top:9px;border:0;background:var(--ink);color:#fff;font:600 14px inherit;padding:11px;border-radius:9px;cursor:pointer}
  .gerr{color:var(--red);font-size:12px;margin-top:9px;min-height:15px}
  @media(max-width:880px){.layout{grid-template-columns:1fr}nav{display:none}main{padding:34px 20px 90px}.rails,.model{grid-template-columns:1fr}.foot{padding:0 20px 50px}}
</style></head>
<body>
<div id="gate"><div class="gbox"><h3>Internal</h3><p>Enter the team password</p>
<input id="pw" type="password" autocomplete="off" autofocus><button id="go">Unlock</button><div class="gerr" id="gerr"></div></div></div>
<div class="layout" id="app" style="display:none">
  <nav id="nav"><div class="navttl">Contents</div></nav>
  <main id="main"></main>
</div>
<div class="foot" id="foot" style="display:none">Internal evidence build, directional figures. <a id="lock">lock device</a></div>

const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function dk(pw,salt){const k=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:CIPHER.iter,hash:'SHA-256'},k,{name:'AES-GCM',length:256},false,['decrypt']);}
async function unlock(pw){try{const key=await dk(pw,b64(CIPHER.salt));const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(CIPHER.iv)},key,b64(CIPHER.ct));localStorage.setItem(KEY,pw);document.getElementById('gate').style.display='none';document.getElementById('app').style.display='grid';document.getElementById('foot').style.display='block';boot(new TextDecoder().decode(pt));return true;}catch(e){return false;}}
document.getElementById('go').onclick=async()=>{if(!await unlock(document.getElementById('pw').value.trim()))document.getElementById('gerr').textContent='Wrong password';};
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('go').click();});
document.getElementById('lock').onclick=()=>{localStorage.removeItem(KEY);location.reload();};
(async()=>{const s=localStorage.getItem(KEY);if(s)await unlock(s);})();
function boot(html){
  document.getElementById('main').innerHTML=html;
  const secs=[...document.querySelectorAll('main section')];
  const nav=document.getElementById('nav');
  secs.forEach(s=>{const h=s.querySelector('h2');const num=s.querySelector('.num').textContent;
    const a=document.createElement('a');a.href='#'+s.id;a.innerHTML=`<span class="n">${num}</span><span>${h.textContent}</span>`;
    a.onclick=e=>{e.preventDefault();s.scrollIntoView({behavior:'smooth',block:'start'});};nav.appendChild(a);});
  const links=[...nav.querySelectorAll('a')];
  const obs=new IntersectionObserver(es=>{es.forEach(en=>{if(en.isIntersecting){const i=secs.indexOf(en.target);links.forEach(l=>l.classList.remove('on'));if(links[i])links[i].classList.add('on');}});},{rootMargin:'-20% 0px -70% 0px'});
  secs.forEach(s=>obs.observe(s));
}
